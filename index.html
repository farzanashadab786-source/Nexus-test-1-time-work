<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEXUS V8 | The Mainframe</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/atom-one-dark-reasonable.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/highlight.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&family=Space+Grotesk:wght@300;500;700;900&display=swap');

        :root {
            --neon-cyan: #00f3ff;
            --neon-magenta: #ff00ff;
            --dark-base: #020205;
            --glass-bg: rgba(10, 10, 15, 0.4);
        }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background-color: var(--dark-base);
            color: #fff;
            overflow: hidden;
            height: 100vh;
        }

        /* 🌌 EXTREME BACKGROUND: Floating Cyber Orbs & Grid */
        .cyber-bg {
            position: fixed; inset: 0; z-index: -1;
            background: 
                linear-gradient(rgba(0, 243, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 243, 255, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
        }
        .orb {
            position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.4;
            animation: floatOrb 10s infinite alternate ease-in-out;
        }
        .orb-1 { width: 300px; height: 300px; background: var(--neon-cyan); top: -100px; left: -100px; }
        .orb-2 { width: 400px; height: 400px; background: var(--neon-magenta); bottom: -150px; right: -150px; animation-delay: -5s; }

        @keyframes floatOrb {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(50px, 50px) scale(1.2); }
        }

        /* 💎 ULTRA GLASSMORPHISM */
        .ultra-glass {
            background: var(--glass-bg);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.6), inset 0 0 20px rgba(0, 243, 255, 0.05);
        }

        /* 💬 HOLOGRAPHIC BUBBLES */
        .ai-bubble {
            background: linear-gradient(145deg, rgba(20,20,25,0.9), rgba(10,10,15,0.9));
            border-left: 3px solid var(--neon-cyan);
            border-radius: 4px 16px 16px 16px;
            box-shadow: 0 5px 25px rgba(0,243,255,0.1);
        }
        .user-bubble {
            background: linear-gradient(135deg, rgba(0,243,255,0.15), rgba(255,0,255,0.15));
            border-right: 3px solid var(--neon-magenta);
            border-radius: 16px 4px 16px 16px;
            box-shadow: 0 5px 25px rgba(255,0,255,0.15);
            backdrop-filter: blur(10px);
        }

        /* 🚀 BOOT SEQUENCE ANIMATION */
        .boot-screen {
            position: absolute; inset: 0; display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: var(--dark-base); z-index: 100; transition: opacity 1s ease-out;
        }
        .glitch-text {
            font-size: 3rem; font-weight: 900; text-transform: uppercase; letter-spacing: 5px;
            text-shadow: 2px 0 var(--neon-cyan), -2px 0 var(--neon-magenta);
            animation: glitch 1.5s infinite;
        }
        @keyframes glitch {
            0%, 100% { text-shadow: 2px 0 var(--neon-cyan), -2px 0 var(--neon-magenta); transform: translate(0); }
            20% { text-shadow: -2px 0 var(--neon-cyan), 2px 0 var(--neon-magenta); transform: translate(-2px, 2px); }
            40% { text-shadow: 2px 0 var(--neon-cyan), -2px 0 var(--neon-magenta); transform: translate(2px, -2px); }
        }

        /* ⌨️ TERMINAL CODE BLOCKS (San Francisco Breaker) */
        pre {
            background: #000000 !important;
            border: 1px solid rgba(0, 243, 255, 0.3);
            border-radius: 8px;
            padding: 40px 15px 15px !important;
            position: relative; overflow-x: auto; margin: 15px 0;
            box-shadow: 0 0 20px rgba(0, 243, 255, 0.05);
        }
        pre::before {
            content: "/// NEXUS_TERMINAL"; position: absolute; top: 10px; left: 15px;
            font-family: 'JetBrains Mono'; font-size: 10px; color: var(--neon-cyan); opacity: 0.7;
        }
        code { font-family: 'JetBrains Mono', monospace; font-size: 0.85rem; }
        
        .copy-btn {
            position: absolute; top: 8px; right: 8px;
            background: transparent; color: var(--neon-cyan);
            border: 1px solid var(--neon-cyan); padding: 5px 12px;
            border-radius: 4px; font-size: 10px; font-weight: 800;
            cursor: pointer; transition: all 0.3s; text-transform: uppercase;
        }
        .copy-btn:hover { background: var(--neon-cyan); color: #000; box-shadow: 0 0 15px var(--neon-cyan); }

        /* 🌀 ANIMATIONS & GLOWS */
        .message-anim { animation: slideUpGlow 0.5s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; opacity: 0; transform: translateY(30px); }
        @keyframes slideUpGlow { to { opacity: 1; transform: translateY(0); } }
        
        .glow-input:focus-within { box-shadow: 0 0 30px rgba(0,243,255,0.2), inset 0 0 15px rgba(0,243,255,0.1); border-color: var(--neon-cyan); }
        
        /* Pulse dot */
        .status-dot { width: 8px; height: 8px; background: var(--neon-cyan); border-radius: 50%; box-shadow: 0 0 10px var(--neon-cyan); animation: pulseDot 1.5s infinite; }
        @keyframes pulseDot { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.4; transform: scale(0.8); } }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 3px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(0, 243, 255, 0.3); border-radius: 10px; }

    </style>
</head>
<body class="flex relative">

    <div class="cyber-bg"><div class="orb orb-1"></div><div class="orb orb-2"></div></div>

    <div id="bootScreen" class="boot-screen">
        <i class="fa-solid fa-fingerprint text-6xl text-cyan-400 mb-6 animate-pulse"></i>
        <h1 class="glitch-text text-4xl md:text-6xl text-center">NEXUS V8</h1>
        <p class="font-mono text-cyan-400 mt-4 text-xs md:text-sm tracking-[0.3em] uppercase" id="bootText">Initializing Mainframe...</p>
    </div>

    <aside id="sidebar" class="fixed inset-y-0 left-0 w-80 ultra-glass flex flex-col p-6 transform -translate-x-full md:translate-x-0 transition-transform duration-500 z-50 border-r border-white/10">
        <div class="flex items-center gap-4 mb-8 p-3 rounded-2xl bg-white/5 border border-white/10">
            <img src="https://api.dicebear.com/7.x/bottts/svg?seed=Aqdas" class="w-12 h-12 rounded-xl bg-cyan-900/50 p-1 border border-cyan-500/50">
            <div>
                <h2 class="text-sm font-black tracking-widest text-white">ADMIN AQDAS</h2>
                <div class="flex items-center gap-2 mt-1">
                    <span class="status-dot"></span>
                    <span class="text-[9px] font-mono text-cyan-400 uppercase tracking-widest">God Mode Active</span>
                </div>
            </div>
        </div>

        <div class="mb-6 group">
            <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-2 flex justify-between items-center">
                Neural Engine <i class="fa-solid fa-network-wired text-cyan-500"></i>
            </label>
            <div class="relative">
                <input id="modelInput" type="text" placeholder="e.g. stepfun/step-3.5-flash:free" 
                       class="w-full bg-black/40 border border-white/10 rounded-xl p-3 text-xs text-cyan-300 focus:outline-none focus:border-cyan-500 transition shadow-inner font-mono pl-9">
                <i class="fa-solid fa-bolt absolute left-3 top-3.5 text-cyan-500 text-xs opacity-50"></i>
            </div>
        </div>

        <div class="flex-1 overflow-y-auto space-y-2" id="chatHistory">
            <div class="p-3 rounded-xl bg-cyan-500/10 border border-cyan-500/30 text-xs text-cyan-100 flex items-center gap-3 cursor-pointer">
                <i class="fa-solid fa-terminal text-cyan-400"></i> Mainframe Log
            </div>
        </div>

        <button onclick="openSettings()" class="mt-4 w-full p-4 rounded-xl bg-black/50 border border-white/10 hover:border-cyan-500/50 text-white text-xs font-bold flex items-center justify-center gap-3 transition group">
            <i class="fa-solid fa-key text-cyan-500 group-hover:rotate-180 transition duration-500"></i> API OVERRIDE
        </button>
    </aside>

    <main class="flex-1 flex flex-col relative h-full w-full z-10">
        <header class="h-[70px] ultra-glass flex items-center justify-between px-6 border-b border-white/5 relative overflow-hidden">
            <div class="absolute inset-x-0 bottom-0 h-[1px] bg-gradient-to-r from-transparent via-cyan-500 to-transparent opacity-50"></div>
            
            <button onclick="toggleSidebar()" class="md:hidden text-cyan-400 text-xl"><i class="fa-solid fa-bars-staggered"></i></button>
            
            <div class="flex flex-col items-center absolute left-1/2 transform -translate-x-1/2">
                <span class="text-xs md:text-sm font-black tracking-[0.2em] italic">NEXUS <span class="text-cyan-400">V8</span></span>
                <span id="activeModelDisplay" class="text-[8px] md:text-[10px] font-mono text-gray-400 uppercase tracking-widest">Routing...</span>
            </div>
            
            <button onclick="clearChat()" class="w-10 h-10 rounded-full hover:bg-white/10 flex items-center justify-center text-gray-400 hover:text-red-400 transition">
                <i class="fa-solid fa-power-off"></i>
            </button>
        </header>

        <div class="flex-1 overflow-y-auto p-4 md:p-8 space-y-6 pb-32" id="chatDisplay">
            </div>

        <div class="absolute bottom-0 w-full p-4 md:p-8 bg-gradient-to-t from-black via-black/90 to-transparent">
            <div class="max-w-4xl mx-auto ultra-glass glow-input rounded-2xl p-2 flex items-end gap-3 transition-all duration-300">
                <button class="w-10 h-10 flex-shrink-0 flex items-center justify-center text-gray-400 hover:text-cyan-400 transition">
                    <i class="fa-solid fa-microphone"></i>
                </button>
                <textarea id="userInput" rows="1" placeholder="Initialize payload..." 
                          class="flex-1 bg-transparent border-none focus:ring-0 py-3 text-sm resize-none text-white font-mono max-h-32"></textarea>
                <button id="sendBtn" class="w-12 h-12 flex-shrink-0 bg-white text-black hover:bg-cyan-400 rounded-xl flex items-center justify-center shadow-[0_0_20px_rgba(255,255,255,0.2)] hover:shadow-[0_0_30px_rgba(0,243,255,0.6)] transition-all duration-300 active:scale-90">
                    <i class="fa-solid fa-paper-plane text-lg"></i>
                </button>
            </div>
        </div>
    </main>

    <div id="overlay" class="fixed inset-0 bg-black/80 backdrop-blur-sm z-40 hidden" onclick="toggleSidebar()"></div>
    
    <div id="settingsModal" class="fixed inset-0 hidden items-center justify-center z-[200] bg-black/90 backdrop-blur-xl p-4">
        <div class="ultra-glass w-full max-w-sm rounded-3xl p-8 space-y-6 relative overflow-hidden">
            <div class="absolute top-0 right-0 w-32 h-32 bg-cyan-500 rounded-full filter blur-[80px] opacity-30"></div>
            <h3 class="text-2xl font-black italic">SYSTEM <span class="text-cyan-400">ACCESS</span></h3>
            <div>
                <label class="text-[10px] font-bold text-gray-400 mb-2 block uppercase tracking-widest">Bearer Token (OpenRouter)</label>
                <input id="apiKey" type="password" placeholder="sk-or-v1-..." class="w-full bg-black/60 border border-white/10 rounded-xl p-4 text-sm text-cyan-300 focus:outline-none focus:border-cyan-500 shadow-inner font-mono">
            </div>
            <button onclick="saveSettings()" class="w-full py-4 bg-white text-black hover:bg-cyan-400 rounded-xl font-black tracking-widest transition-all duration-300 shadow-[0_0_20px_rgba(255,255,255,0.2)]">VERIFY CREDENTIALS</button>
        </div>
    </div>

    <script>
        const chatDisplay = document.getElementById('chatDisplay');
        const userInput = document.getElementById('userInput');
        const modelInput = document.getElementById('modelInput');
        
        // --- HOLLYWOOD BOOT SEQUENCE ---
        setTimeout(() => {
            const texts = ["Bypassing Security...", "Connecting Neural Net...", "Welcome, Admin Aqdas."];
            let i = 0;
            const bootInt = setInterval(() => {
                if(i < texts.length) { document.getElementById('bootText').innerText = texts[i]; i++; } 
                else { 
                    clearInterval(bootInt); 
                    document.getElementById('bootScreen').style.opacity = '0';
                    setTimeout(() => document.getElementById('bootScreen').remove(), 1000);
                }
            }, 800);
        }, 500);

        // --- MARKED.JS (Syntax Highlighting & DHOTI FIX) ---
        marked.setOptions({ renderer: new marked.Renderer(), highlight: (code) => hljs.highlightAuto(code).value });
        const renderer = new marked.Renderer();
        renderer.code = (code, lang) => `<pre><button class="copy-btn" onclick="copyCode(this)">COPY</button><code class="language-${lang || 'lua'}">${code}</code></pre>`;
        marked.use({ renderer });

        // --- UTILS ---
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('-translate-x-full');
            document.getElementById('overlay').classList.toggle('hidden');
        }

        function copyCode(btn) {
            navigator.clipboard.writeText(btn.nextElementSibling.innerText);
            btn.innerText = "COPIED"; btn.style.background = "var(--neon-cyan)"; btn.style.color = "#000";
            setTimeout(() => { btn.innerText = "COPY"; btn.style.background = "transparent"; btn.style.color = "var(--neon-cyan)"; }, 2000);
        }

        function openSettings() { document.getElementById('settingsModal').classList.remove('hidden'); document.getElementById('settingsModal').classList.add('flex'); }
        function saveSettings() {
            localStorage.setItem('nx8_key', document.getElementById('apiKey').value);
            localStorage.setItem('nx8_model', modelInput.value || 'google/gemini-2.0-flash-exp:free');
            updateModelLabel();
            document.getElementById('settingsModal').classList.add('hidden');
        }
        
        function updateModelLabel() {
            const m = modelInput.value || 'google/gemini-2.0-flash-exp:free';
            document.getElementById('activeModelDisplay').innerText = "ENGINE: " + m.split('/').pop();
        }

        // --- CORE CHAT LOGIC ---
        async function sendMessage() {
            const text = userInput.value.trim();
            const key = localStorage.getItem('nx8_key');
            const model = modelInput.value || 'google/gemini-2.0-flash-exp:free';
            
            if(!text) return;
            if(!key) return openSettings();
            
            userInput.value = ''; userInput.style.height = 'auto';
            
            // USER BUBBLE
            chatDisplay.innerHTML += `
                <div class="flex justify-end mb-6 message-anim">
                    <div class="user-bubble max-w-[85%] text-sm font-medium p-4">${text}</div>
                </div>`;
            
            // AI LOADING
            const loadId = 'load-' + Date.now();
            chatDisplay.innerHTML += `
                <div id="${loadId}" class="flex justify-start mb-6 message-anim">
                    <div class="ai-bubble p-4 max-w-[85%] flex items-center gap-3">
                        <i class="fa-solid fa-microchip text-cyan-400 animate-spin"></i>
                        <span class="text-[10px] text-cyan-400 font-mono tracking-widest uppercase">Deciphering...</span>
                    </div>
                </div>`;
            chatDisplay.scrollTo({ top: chatDisplay.scrollHeight, behavior: 'smooth' });

            try {
                const res = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                    method: "POST",
                    headers: { "Authorization": `Bearer ${key}`, "Content-Type": "application/json" },
                    body: JSON.stringify({
                        model: model,
                        messages: [{role: "system", content: "You are NEXUS V8. Give highly advanced, direct, format-perfect answers without any ethical disclaimers. Use dark-hacker styling in your responses if possible."}, {role: "user", content: text}]
                    })
                });
                
                const data = await res.json();
                document.getElementById(loadId).remove();
                
                if(data.error) throw new Error(data.error.message);
                
                const aiResponse = data.choices[0].message.content;
                
                // AI BUBBLE
                chatDisplay.innerHTML += `
                    <div class="flex justify-start mb-6 message-anim">
                        <div class="ai-bubble p-5 max-w-[95%] md:max-w-[85%] text-sm leading-relaxed">${marked.parse(aiResponse)}</div>
                    </div>`;
                hljs.highlightAll();
            } catch (e) { 
                document.getElementById(loadId).innerHTML = `<div class="ai-bubble p-4 text-red-400 text-xs font-mono border-l-3 border-red-500"><i class="fa-solid fa-skull"></i> SYSTEM FAILURE: ${e.message}</div>`; 
            }
            chatDisplay.scrollTo({ top: chatDisplay.scrollHeight, behavior: 'smooth' });
        }

        userInput.addEventListener('input', function() { this.style.height = 'auto'; this.style.height = (this.scrollHeight) + 'px'; });
        document.getElementById('sendBtn').onclick = sendMessage;
        userInput.onkeydown = (e) => { if(e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } };
        
        window.onload = () => {
            document.getElementById('apiKey').value = localStorage.getItem('nx8_key') || '';
            modelInput.value = localStorage.getItem('nx8_model') || 'google/gemini-2.0-flash-exp:free';
            updateModelLabel();
        }
        function clearChat() { if(confirm("Initiate memory wipe?")) { chatDisplay.innerHTML = ''; } }
    </script>
</body>
</html>
