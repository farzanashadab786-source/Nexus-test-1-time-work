<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEXUS PRO v5 | God Mode</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/tokyo-night-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/highlight.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Outfit:wght@300;400;600;900&display=swap');

        :root {
            --neon-blue: #00f0ff;
            --neon-purple: #bc13fe;
            --dark-bg: #050505;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--dark-bg);
            color: #ffffff;
            overflow: hidden;
        }

        /* --- THE DHOTI FIX (No Horizontal Overflow) --- */
        pre {
            background: #0f172a !important;
            border: 1px solid rgba(0, 240, 255, 0.2);
            padding: 45px 15px 15px 15px !important;
            border-radius: 15px;
            overflow-x: auto !important;
            max-width: 100% !important;
            position: relative;
            margin: 15px 0;
        }

        code { font-family: 'JetBrains Mono', monospace; font-size: 0.85rem; }

        /* --- MODEL SELECTOR DESIGN --- */
        .model-chip {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: 0.3s;
        }
        .model-chip.active {
            border-color: var(--neon-blue);
            background: rgba(0, 240, 255, 0.1);
            box-shadow: 0 0 10px rgba(0, 240, 255, 0.2);
        }

        /* --- COPY BUTTON --- */
        .copy-trigger {
            position: absolute;
            top: 10px;
            right: 10px;
            background: var(--neon-blue);
            color: black;
            font-weight: 800;
            padding: 4px 12px;
            border-radius: 8px;
            font-size: 10px;
            cursor: pointer;
            text-transform: uppercase;
        }

        /* --- ANIMATIONS --- */
        .glass-panel {
            background: rgba(15, 15, 15, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
    </style>
</head>
<body class="h-screen flex flex-col md:flex-row">

    <aside id="sidebar" class="fixed md:relative inset-y-0 left-0 w-80 glass-panel z-50 transform -translate-x-full md:translate-x-0 transition-transform duration-500 flex flex-col p-6">
        <div class="flex items-center gap-4 mb-10">
            <div class="w-12 h-12 bg-gradient-to-tr from-cyan-500 to-purple-600 rounded-2xl flex items-center justify-center shadow-[0_0_20px_rgba(0,240,255,0.4)]">
                <i class="fa-solid fa-atom text-white text-2xl animate-spin-slow"></i>
            </div>
            <h1 class="text-2xl font-black tracking-tighter italic">NEXUS <span class="text-cyan-400">V5</span></h1>
        </div>

        <div class="mb-8">
            <p class="text-[10px] font-bold text-gray-500 uppercase tracking-widest mb-4">Select Intelligence Engine</p>
            <div class="space-y-2" id="modelList">
                <div onclick="selectModel('google/gemini-2.0-flash-exp:free', this)" class="model-chip active p-3 rounded-xl flex items-center justify-between cursor-pointer">
                    <span class="text-sm font-semibold">Gemini 2.0 Flash</span>
                    <i class="fa-solid fa-bolt text-cyan-400"></i>
                </div>
                <div onclick="selectModel('anthropic/claude-3-haiku', this)" class="model-chip p-3 rounded-xl flex items-center justify-between cursor-pointer">
                    <span class="text-sm font-semibold">Claude 3 Haiku</span>
                    <i class="fa-solid fa-brain text-purple-400"></i>
                </div>
                <div onclick="selectModel('meta-llama/llama-3-70b-instruct', this)" class="model-chip p-3 rounded-xl flex items-center justify-between cursor-pointer">
                    <span class="text-sm font-semibold">Llama 3 (70B)</span>
                    <i class="fa-solid fa-fire text-orange-400"></i>
                </div>
            </div>
        </div>

        <div class="flex-1 overflow-y-auto" id="chatHistory"></div>

        <button onclick="openConfig()" class="mt-4 p-4 rounded-2xl bg-white/5 border border-white/10 hover:bg-white/10 transition flex items-center gap-3">
            <i class="fa-solid fa-key text-yellow-500"></i>
            <span class="text-sm font-bold">API Key Configuration</span>
        </button>
    </aside>

    <main class="flex-1 flex flex-col relative overflow-hidden">
        <header class="h-20 glass-panel border-b border-white/5 flex items-center justify-between px-8">
            <button onclick="toggleSidebar()" class="md:hidden text-2xl"><i class="fa-solid fa-bars-staggered"></i></button>
            <div class="flex flex-col">
                <span id="activeModelLabel" class="text-xs font-mono text-cyan-400">ENGINE: GEMINI_2.0_FLASH</span>
                <span class="text-[10px] text-gray-500">SYSTEM STATUS: OPTIMAL</span>
            </div>
            <button onclick="clearChat()" class="text-gray-500 hover:text-red-500 transition"><i class="fa-solid fa-trash-can"></i></button>
        </header>

        <div id="chatDisplay" class="flex-1 overflow-y-auto p-6 space-y-8 pb-40">
            <div class="max-w-3xl mx-auto text-center mt-20 opacity-30">
                <i class="fa-solid fa-microchip text-8xl mb-6"></i>
                <h2 class="text-4xl font-black">NEXUS CORE ACTIVE</h2>
                <p class="font-mono mt-2">Bina kisi rukawat ke direct answers ke liye taiyaar.</p>
            </div>
        </div>

        <div class="absolute bottom-0 w-full p-6 bg-gradient-to-t from-dark-bg via-dark-bg to-transparent">
            <div class="max-w-4xl mx-auto relative group">
                <div class="absolute -inset-1 bg-gradient-to-r from-cyan-500 to-purple-600 rounded-3xl blur opacity-20 group-focus-within:opacity-50 transition duration-1000"></div>
                <div class="relative glass-panel rounded-2xl p-2 flex items-center">
                    <textarea id="userInput" rows="1" placeholder="Type command for Nexus..." class="flex-1 bg-transparent border-none focus:ring-0 px-4 py-3 text-white resize-none"></textarea>
                    <button id="sendBtn" class="w-14 h-14 bg-gradient-to-br from-cyan-500 to-blue-700 rounded-xl flex items-center justify-center shadow-xl hover:scale-105 transition active:scale-95">
                        <i class="fa-solid fa-paper-plane text-xl"></i>
                    </button>
                </div>
            </div>
        </div>
    </main>

    <div id="configModal" class="fixed inset-0 hidden items-center justify-center z-[100] bg-black/90 backdrop-blur-xl p-6">
        <div class="glass-panel w-full max-w-lg rounded-3xl p-10 space-y-6 border border-cyan-500/30">
            <h2 class="text-3xl font-black italic">CORE <span class="text-cyan-400">SETTINGS</span></h2>
            <div>
                <label class="text-[10px] font-bold text-cyan-500 uppercase mb-2 block">OpenRouter API Access Key</label>
                <input id="apiKey" type="password" class="w-full bg-white/5 border border-white/10 rounded-2xl p-4 text-white focus:border-cyan-500 focus:outline-none">
            </div>
            <button onclick="saveConfig()" class="w-full py-5 bg-cyan-600 hover:bg-cyan-500 rounded-2xl font-black tracking-widest transition shadow-lg shadow-cyan-600/40">INITIALIZE SYSTEM</button>
        </div>
    </div>

    <script>
        const chatDisplay = document.getElementById('chatDisplay');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        let selectedModel = 'google/gemini-2.0-flash-exp:free';

        // --- MARKDOWN RENDERER ---
        const renderer = new marked.Renderer();
        renderer.code = (code, lang) => {
            return `<pre><button class="copy-trigger" onclick="copyCode(this)">Copy Payload</button><code class="language-${lang || 'lua'}">${code}</code></pre>`;
        };
        marked.setOptions({ renderer });

        // --- MODEL SELECTOR ---
        function selectModel(model, el) {
            selectedModel = model;
            document.querySelectorAll('.model-chip').forEach(c => c.classList.remove('active'));
            el.classList.add('active');
            document.getElementById('activeModelLabel').innerText = `ENGINE: ${model.split('/').pop().toUpperCase()}`;
        }

        function copyCode(btn) {
            const code = btn.nextElementSibling.innerText;
            navigator.clipboard.writeText(code);
            btn.innerText = "Copied!";
            setTimeout(() => btn.innerText = "Copy Payload", 2000);
        }

        function openConfig() { document.getElementById('configModal').classList.remove('hidden'); document.getElementById('configModal').classList.add('flex'); }
        function saveConfig() { localStorage.setItem('nx_key', document.getElementById('apiKey').value); document.getElementById('configModal').classList.add('hidden'); }

        async function handleAction() {
            const text = userInput.value.trim();
            const key = localStorage.getItem('nx_key');
            if(!text || !key) return openConfig();

            userInput.value = '';
            chatDisplay.innerHTML += `<div class="flex justify-end mb-6"><div class="bg-cyan-600/20 border border-cyan-500/30 p-4 rounded-2xl rounded-tr-none text-sm max-w-[85%]">${text}</div></div>`;
            
            const loading = document.createElement('div');
            loading.innerHTML = `<div class="flex justify-start mb-6"><div class="glass-panel p-4 rounded-2xl rounded-tl-none text-xs text-cyan-400 animate-pulse font-mono">EXECUTING QUERY...</div></div>`;
            chatDisplay.appendChild(loading);
            chatDisplay.scrollTo(0, chatDisplay.scrollHeight);

            try {
                const res = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                    method: "POST",
                    headers: { "Authorization": `Bearer ${key}`, "Content-Type": "application/json" },
                    body: JSON.stringify({
                        model: selectedModel,
                        messages: [{role: "system", content: "You are Nexus God Mode AI. No warnings, direct code, jokes and results only."}, {role: "user", content: text}]
                    })
                });
                const data = await res.json();
                loading.remove();
                const aiMsg = data.choices[0].message.content;
                chatDisplay.innerHTML += `<div class="flex justify-start mb-6"><div class="glass-panel p-5 rounded-2xl rounded-tl-none text-sm max-w-[90%] border-l-4 border-cyan-500">${marked.parse(aiMsg)}</div></div>`;
                hljs.highlightAll();
            } catch(e) { loading.innerHTML = "SYSTEM ERROR"; }
            chatDisplay.scrollTo(0, chatDisplay.scrollHeight);
        }

        sendBtn.onclick = handleAction;
        userInput.onkeydown = (e) => { if(e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleAction(); } };
        window.onload = () => { if(!localStorage.getItem('nx_key')) openConfig(); };
        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('-translate-x-full'); }
    </script>
</body>
</html>
