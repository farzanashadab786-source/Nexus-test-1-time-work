<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEXUS V10 | Admin Aqdas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/tokyo-night-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/highlight.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono&family=Space+Grotesk:wght@300;700;900&display=swap');
        
        /* 🔥 FULL SCREEN FIX */
        html, body { 
            height: 100%; 
            margin: 0; 
            padding: 0; 
            overflow: hidden; 
            background: #020205; 
            font-family: 'Space Grotesk', sans-serif;
        }

        .main-container {
            display: flex;
            flex-direction: column;
            height: 100dvh; /* Dynamic Viewport Height for Mobile */
        }

        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.05); }

        /* Chat Display - Fixed Scrolling Area */
        #chatDisplay {
            flex: 1;
            overflow-y: auto;
            padding-bottom: 20px;
        }

        /* 🚀 INPUT DOCK - Uupar and Inside Frame */
        .input-dock {
            padding: 15px;
            background: linear-gradient(to top, #020205, transparent);
        }

        .input-box-wrapper {
            background: rgba(30, 41, 59, 0.7);
            border: 1.5px solid rgba(34, 211, 238, 0.3);
            border-radius: 18px;
            display: flex;
            align-items: flex-end;
            gap: 8px;
            padding: 8px 12px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5), inset 0 0 10px rgba(34, 211, 238, 0.05);
        }

        textarea {
            flex: 1;
            background: transparent;
            border: none !important;
            outline: none !important;
            color: white;
            font-size: 14px;
            padding: 8px 0;
            max-height: 120px;
            resize: none;
        }

        /* Bubbles */
        .ai-msg { background: #1e293b; border-left: 3px solid #06b6d4; border-radius: 4px 18px 18px 18px; color: #e2e8f0; }
        .user-msg { background: #0891b2; color: white; border-radius: 18px 4px 18px 18px; font-weight: 600; }

        pre { background: #000 !important; border-radius: 10px; padding: 35px 12px 12px !important; position: relative; font-size: 13px; margin: 10px 0; }
        .copy-btn { position: absolute; top: 8px; right: 8px; background: #06b6d4; color: black; font-size: 9px; font-weight: 800; padding: 3px 8px; border-radius: 4px; }
    </style>
</head>
<body>

    <div class="main-container">
        <header class="h-14 glass flex items-center justify-between px-5 shrink-0">
            <button onclick="toggleSidebar()" class="text-cyan-400"><i class="fa-solid fa-bars-staggered"></i></button>
            <div class="flex items-center gap-2">
                <span class="w-2 h-2 bg-cyan-500 rounded-full animate-pulse shadow-[0_0_8px_cyan]"></span>
                <span class="text-[10px] font-black tracking-widest text-cyan-500 uppercase">Nexus Terminal</span>
            </div>
            <button onclick="openSettings()" class="text-gray-400"><i class="fa-solid fa-microchip"></i></button>
        </header>

        <div id="chatDisplay" class="p-4 space-y-6">
            <div id="welcome" class="text-center opacity-20 mt-10">
                <i class="fa-solid fa-shield-halved text-6xl mb-3 text-cyan-500"></i>
                <h2 class="text-xl font-black uppercase tracking-widest text-white">System Mainframe</h2>
            </div>
        </div>

        <div class="input-dock shrink-0">
            <div class="max-w-4xl mx-auto input-box-wrapper">
                <button class="w-8 h-8 flex items-center justify-center text-gray-500"><i class="fa-solid fa-plus"></i></button>
                <textarea id="userInput" rows="1" placeholder="Type command..."></textarea>
                <button id="sendBtn" class="w-10 h-10 bg-cyan-500 text-black rounded-xl flex items-center justify-center shadow-lg active:scale-90 transition-all">
                    <i class="fa-solid fa-paper-plane"></i>
                </button>
            </div>
            <p class="text-[8px] text-center text-gray-600 mt-2 font-mono uppercase tracking-widest">Authorized Access Only - Admin Aqdas</p>
        </div>
    </div>

    <div id="settingsModal" class="fixed inset-0 hidden items-center justify-center z-[100] bg-black/90 backdrop-blur-xl p-6">
        <div class="glass w-full max-w-sm rounded-3xl p-6 space-y-4">
            <h3 class="text-lg font-black text-cyan-400">CORE_CONFIG</h3>
            <textarea id="systemPrompt" rows="3" placeholder="System Prompt..." class="w-full bg-black border border-white/10 rounded-xl p-3 text-xs text-white outline-none"></textarea>
            <input id="apiKey" type="password" placeholder="API Key (sk-...)" class="w-full bg-black border border-white/10 rounded-xl p-3 text-xs text-cyan-300 outline-none">
            <input id="modelInput" type="text" placeholder="Model ID" class="w-full bg-black border border-white/10 rounded-xl p-3 text-xs text-white outline-none">
            <select id="apiType" class="w-full bg-black border border-white/10 rounded-xl p-3 text-xs text-cyan-300 outline-none">
                <option value="openrouter">OpenRouter</option>
                <option value="deepseek">DeepSeek Direct</option>
            </select>
            <button onclick="saveSettings()" class="w-full py-3 bg-cyan-500 rounded-xl font-black text-black text-sm shadow-lg shadow-cyan-500/30">INITIALIZE</button>
        </div>
    </div>

    <script>
        const chatDisplay = document.getElementById('chatDisplay');
        const userInput = document.getElementById('userInput');
        
        marked.setOptions({ highlight: (code) => hljs.highlightAuto(code).value });
        const renderer = new marked.Renderer();
        renderer.code = (code, lang) => `<pre><button class="copy-btn" onclick="copyCode(this)">COPY</button><code class="language-${lang || 'lua'}">${code}</code></pre>`;
        marked.use({ renderer });

        function copyCode(btn) { navigator.clipboard.writeText(btn.nextElementSibling.innerText); btn.innerText = "DONE"; setTimeout(() => btn.innerText = "COPY", 2000); }
        function openSettings() { document.getElementById('settingsModal').classList.remove('hidden'); document.getElementById('settingsModal').classList.add('flex'); }
        function saveSettings() {
            localStorage.setItem('nx_key', document.getElementById('apiKey').value);
            localStorage.setItem('nx_sys', document.getElementById('systemPrompt').value);
            localStorage.setItem('nx_mod', document.getElementById('modelInput').value);
            localStorage.setItem('nx_typ', document.getElementById('apiType').value);
            document.getElementById('settingsModal').classList.add('hidden');
        }

        async function sendMessage() {
            const text = userInput.value.trim();
            const key = localStorage.getItem('nx_key');
            if(!text || !key) return openSettings();

            document.getElementById('welcome').classList.add('hidden');
            userInput.value = ''; userInput.style.height = 'auto';

            chatDisplay.innerHTML += `<div class="flex justify-end mb-4"><div class="user-msg p-3 max-w-[85%] text-sm shadow-md">${text}</div></div>`;
            const loadId = 'load-' + Date.now();
            chatDisplay.innerHTML += `<div id="${loadId}" class="flex justify-start mb-4"><div class="ai-msg p-3 text-[10px] font-mono text-cyan-400 animate-pulse">PROCESSING...</div></div>`;
            chatDisplay.scrollTo(0, chatDisplay.scrollHeight);

            const endpoint = localStorage.getItem('nx_typ') === 'deepseek' ? "https://api.deepseek.com/chat/completions" : "https://openrouter.ai/api/v1/chat/completions";

            try {
                const res = await fetch(endpoint, {
                    method: "POST",
                    headers: { "Authorization": `Bearer ${key}`, "Content-Type": "application/json" },
                    body: JSON.stringify({
                        model: localStorage.getItem('nx_mod') || "google/gemini-2.0-flash-exp:free",
                        messages: [{role: "system", content: localStorage.getItem('nx_sys') || ""}, {role: "user", content: text}]
                    })
                });
                const data = await res.json();
                document.getElementById(loadId).remove();
                chatDisplay.innerHTML += `<div class="flex justify-start mb-4"><div class="ai-msg p-4 max-w-[95%] text-sm leading-relaxed">${marked.parse(data.choices[0].message.content)}</div></div>`;
                hljs.highlightAll();
                chatDisplay.scrollTo(0, chatDisplay.scrollHeight);
            } catch (e) { document.getElementById(loadId).innerText = "ERROR: CHECK CONFIG"; }
        }

        userInput.addEventListener('input', function() { this.style.height = 'auto'; this.style.height = (this.scrollHeight) + 'px'; });
        document.getElementById('sendBtn').onclick = sendMessage;
        window.onload = () => {
            document.getElementById('apiKey').value = localStorage.getItem('nx_key') || '';
            document.getElementById('systemPrompt').value = localStorage.getItem('nx_sys') || '';
            document.getElementById('modelInput').value = localStorage.getItem('nx_mod') || 'google/gemini-2.0-flash-exp:free';
            document.getElementById('apiType').value = localStorage.getItem('nx_typ') || 'openrouter';
        }
    </script>
</body>
</html>
