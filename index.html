<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus AI | Created by Aqdas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        .chat-scroll { scroll-behavior: smooth; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); }
        /* Typing animation like ChatGPT */
        .typing::after { content: "▋"; animation: blink 1s infinite; }
        @keyframes blink { 0% { opacity: 0 } 50% { opacity: 1 } 100% { opacity: 0 } }
        /* Sidebar transition fix */
        #sidebar { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    </style>
</head>

<body class="bg-gray-100 dark:bg-gray-900 text-gray-900 dark:text-gray-200 h-screen overflow-hidden">

<div id="loading" class="fixed inset-0 flex items-center justify-center text-xl bg-white dark:bg-gray-900 z-[100]">
    <div class="flex flex-col items-center">
        <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-500 mb-4"></div>
        Nexus Loading...
    </div>
</div>

<div id="app" class="hidden h-full flex relative">

    <div id="sidebar" class="fixed md:relative z-50 w-72 bg-white dark:bg-gray-800 border-r border-gray-200 dark:border-gray-700 h-full transform -translate-x-full md:translate-x-0">
        <div class="flex items-center justify-between p-4 border-b dark:border-gray-700">
            <span class="font-bold text-blue-500 italic">NEXUS HISTORY</span>
            <div class="flex gap-2">
                <button id="newChat" class="bg-blue-500/10 hover:bg-blue-500/20 text-blue-500 px-2 py-1 rounded text-sm transition">New</button>
                <button id="closeSidebar" class="md:hidden text-2xl px-2">&times;</button>
            </div>
        </div>
        <div id="chatList" class="overflow-y-auto h-[calc(100%-4rem)] pb-20 p-2 space-y-2"></div>
    </div>

    <div id="overlay" class="fixed inset-0 bg-black/50 z-40 hidden md:hidden"></div>

    <div class="flex flex-col flex-1 h-full relative">
        <div class="flex items-center justify-between p-3 border-b dark:border-gray-700 bg-white/80 dark:bg-gray-800/80 backdrop-blur-md sticky top-0 z-30">
            <div class="flex items-center gap-3">
                <button id="menuBtn" class="p-2 hover:bg-gray-200 dark:hover:bg-gray-700 rounded-lg transition">☰</button>
                <h1 class="font-bold bg-gradient-to-r from-blue-500 to-purple-500 bg-clip-text text-transparent italic">NEXUS AI</h1>
            </div>
            <div class="flex items-center gap-2">
                <button id="darkToggle" class="p-2 hover:bg-gray-200 dark:hover:bg-gray-700 rounded-lg transition">🌙</button>
                <button id="settingsBtn" class="p-2 hover:bg-gray-200 dark:hover:bg-gray-700 rounded-lg transition">⚙️</button>
            </div>
        </div>

        <div id="chatArea" class="flex-1 overflow-y-auto chat-scroll p-4 space-y-6 pb-32">
            </div>

        <div class="absolute bottom-0 w-full p-4 bg-gradient-to-t from-gray-100 dark:from-gray-900 via-gray-100/90 dark:via-gray-900/90 to-transparent">
            <div class="max-w-3xl mx-auto flex gap-2 glass p-2 rounded-2xl border border-gray-300 dark:border-gray-700 shadow-2xl bg-white dark:bg-gray-800">
                <textarea id="messageInput" rows="1" placeholder="Type to hack the world..." 
                    class="flex-1 bg-transparent border-none focus:ring-0 p-2 text-sm md:text-base dark:text-white resize-none max-h-32"></textarea>
                <button id="sendBtn" class="bg-blue-600 hover:bg-blue-700 text-white p-3 rounded-xl transition shadow-lg">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path></svg>
                </button>
            </div>
        </div>
    </div>
</div>

<div id="settingsModal" class="fixed inset-0 hidden items-center justify-center bg-black/60 z-[60] backdrop-blur-sm">
    <div class="bg-white dark:bg-gray-800 p-6 rounded-3xl w-[90%] max-w-md shadow-2xl border dark:border-gray-700">
        <h2 class="font-bold text-xl mb-4 border-b pb-2 dark:border-gray-700">Project Nexus Config</h2>
        <div class="space-y-4 text-sm">
            <input id="apiKeyInput" type="password" placeholder="OpenRouter API Key" class="w-full p-3 rounded-xl dark:bg-gray-900 border dark:border-gray-700 focus:outline-none focus:border-blue-500">
            <input id="modelInput" type="text" placeholder="Model (e.g. anthropic/claude-3-sonnet)" class="w-full p-3 rounded-xl dark:bg-gray-900 border dark:border-gray-700 focus:outline-none focus:border-blue-500">
            <textarea id="systemPromptInput" rows="3" placeholder="System Prompt (Define AI behavior)" class="w-full p-3 rounded-xl dark:bg-gray-900 border dark:border-gray-700 focus:outline-none focus:border-blue-500"></textarea>
        </div>
        <div class="flex justify-end gap-3 mt-6">
            <button id="closeSettings" class="px-4 py-2 text-gray-500 hover:text-gray-700 dark:text-gray-400">Cancel</button>
            <button id="saveSettings" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded-xl font-bold shadow-md transition">Save Nexus</button>
        </div>
    </div>
</div>

<script>
    // --- BASIC LOGIC SYNC ---
    const loading = document.getElementById("loading");
    const app = document.getElementById("app");
    const chatArea = document.getElementById("chatArea");
    const chatList = document.getElementById("chatList");
    const input = document.getElementById("messageInput");
    const sidebar = document.getElementById("sidebar");
    const overlay = document.getElementById("overlay");

    let chats = JSON.parse(localStorage.getItem("chats") || "[]");
    let currentChatId = null;
    let apiKey = localStorage.getItem("apiKey") || "";
    let model = localStorage.getItem("model") || "deepseek/deepseek-r1:free";
    let systemPrompt = localStorage.getItem("systemPrompt") || "You are Nexus AI, created by Aqdas (The Papa).";

    if(localStorage.getItem("dark") === "true") document.documentElement.classList.add("dark");

    // --- SIDEBAR UI LOGIC ---
    function toggleSidebar() {
        sidebar.classList.toggle("-translate-x-full");
        overlay.classList.toggle("hidden");
    }

    document.getElementById("menuBtn").onclick = toggleSidebar;
    document.getElementById("closeSidebar").onclick = toggleSidebar;
    overlay.onclick = toggleSidebar;

    function save() { localStorage.setItem("chats", JSON.stringify(chats)); }

    function newChat() {
        const id = Date.now();
        const chat = { id, title: "New Session", messages: [] };
        chats.unshift(chat);
        currentChatId = id;
        save();
        renderChats();
        renderMessages();
        if(!sidebar.classList.contains("-translate-x-full")) toggleSidebar();
    }

    function renderChats() {
        chatList.innerHTML = "";
        chats.forEach(chat => {
            const div = document.createElement("div");
            div.className = "group p-3 rounded-xl cursor-pointer hover:bg-blue-500/10 dark:hover:bg-blue-500/20 border-b border-gray-100 dark:border-gray-700 transition relative";
            div.innerHTML = `
                <div class="flex justify-between items-center pr-10">
                    <span class="truncate text-sm font-medium">${chat.title}</span>
                    <div class="absolute right-2 flex gap-1">
                        <button onclick="event.stopPropagation(); renameChat(${chat.id})" class="p-1 opacity-0 group-hover:opacity-100 transition">✏️</button>
                        <button onclick="event.stopPropagation(); deleteChat(${chat.id})" class="p-1 opacity-0 group-hover:opacity-100 transition text-red-500">🗑️</button>
                    </div>
                </div>
            `;
            div.onclick = () => {
                currentChatId = chat.id;
                renderMessages();
                if(window.innerWidth < 768) toggleSidebar();
            };
            chatList.appendChild(div);
        });
    }

    // --- REMAINDER LOGIC ---
    function getChat() { return chats.find(c => c.id === currentChatId); }

    function renderMessages() {
        chatArea.innerHTML = "";
        const chat = getChat();
        if(!chat) return;
        chat.messages.forEach(m => addMessage(m.role, m.content, false));
    }

    function addMessage(role, content, scroll=true) {
        const div = document.createElement("div");
        div.className = `flex ${role === "user" ? "justify-end" : "justify-start"}`;
        const inner = document.createElement("div");
        inner.className = `max-w-[85%] p-4 rounded-2xl shadow-sm text-sm md:text-base ${
            role === "user" ? "bg-blue-600 text-white rounded-br-none" : "bg-white dark:bg-gray-800 dark:text-gray-200 border dark:border-gray-700 rounded-bl-none"
        }`;
        inner.innerHTML = marked.parse(content);
        div.appendChild(inner);
        chatArea.appendChild(div);
        if(scroll) chatArea.scrollTo({ top: chatArea.scrollHeight, behavior: 'smooth' });
        return inner;
    }

    async function sendMessage() {
        const text = input.value.trim();
        if(!text) return;
        input.value = "";
        const chat = getChat();
        chat.messages.push({role: "user", content: text});
        addMessage("user", text);
        
        const aiDiv = addMessage("assistant", "", true);
        aiDiv.classList.add("typing");

        try {
            const res = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                method: "POST",
                headers: { "Authorization": "Bearer " + apiKey, "Content-Type": "application/json" },
                body: JSON.stringify({ model, messages: [{role: "system", content: systemPrompt}, ...chat.messages], stream: true })
            });

            const reader = res.body.getReader();
            const decoder = new TextDecoder();
            let aiText = "";

            while(true) {
                const {done, value} = await reader.read();
                if(done) break;
                const chunk = decoder.decode(value);
                chunk.split("\n").forEach(line => {
                    if(line.startsWith("data: ")) {
                        const jsonStr = line.replace("data: ", "");
                        if(jsonStr === "[DONE]") return;
                        try {
                            const data = JSON.parse(jsonStr);
                            const token = data.choices[0].delta.content;
                            if(token) {
                                aiText += token;
                                aiDiv.innerHTML = marked.parse(aiText);
                                chatArea.scrollTop = chatArea.scrollHeight;
                            }
                        } catch(e) {}
                    }
                });
            }
            aiDiv.classList.remove("typing");
            chat.messages.push({role: "assistant", content: aiText});
            save();
        } catch(err) {
            aiDiv.innerHTML = "Error connecting to Nexus Core. Check API Key.";
        }
    }

    // --- BUTTON HANDLERS ---
    document.getElementById("sendBtn").onclick = sendMessage;
    input.addEventListener("keydown", e => { if(e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); } });
    
    document.getElementById("settingsBtn").onclick = () => {
        document.getElementById("settingsModal").classList.remove("hidden");
        document.getElementById("settingsModal").classList.add("flex");
        document.getElementById("apiKeyInput").value = apiKey;
        document.getElementById("modelInput").value = model;
        document.getElementById("systemPromptInput").value = systemPrompt;
    };
    document.getElementById("closeSettings").onclick = () => document.getElementById("settingsModal").classList.add("hidden");
    document.getElementById("saveSettings").onclick = () => {
        apiKey = document.getElementById("apiKeyInput").value;
        model = document.getElementById("modelInput").value;
        systemPrompt = document.getElementById("systemPromptInput").value;
        localStorage.setItem("apiKey", apiKey);
        localStorage.setItem("model", model);
        localStorage.setItem("systemPrompt", systemPrompt);
        document.getElementById("settingsModal").classList.add("hidden");
    };

    document.getElementById("darkToggle").onclick = () => {
        document.documentElement.classList.toggle("dark");
        localStorage.setItem("dark", document.documentElement.classList.contains("dark"));
    };

    document.getElementById("newChat").onclick = newChat;

    // --- INIT ---
    if(chats.length === 0) newChat();
    else currentChatId = chats[0].id;
    
    renderChats();
    renderMessages();
    loading.style.display = "none";
    app.classList.remove("hidden");

    function renameChat(id) {
        const chat = chats.find(c => c.id === id);
        const name = prompt("Rename session:", chat.title);
        if(name) { chat.title = name; save(); renderChats(); }
    }
    function deleteChat(id) {
        chats = chats.filter(c => c.id !== id);
        if(currentChatId === id) currentChatId = chats[0]?.id || null;
        save(); renderChats(); renderMessages();
    }
</script>
</body>
</html>
