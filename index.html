<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEXUS v4.0 | God-Tier AI</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/tokyo-night-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/highlight.min.js"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        cyber: { black: '#050505', gray: '#121212', blue: '#00f0ff', purple: '#8a2be2', red: '#ff003c' }
                    },
                    animation: {
                        'glow': 'glow 2s ease-in-out infinite alternate',
                        'slide-in': 'slideIn 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards',
                        'fade-in': 'fadeIn 0.5s ease-out',
                    },
                    keyframes: {
                        glow: { '0%': { boxShadow: '0 0 5px #00f0ff' }, '100%': { boxShadow: '0 0 20px #00f0ff, 0 0 30px #8a2be2' } },
                        slideIn: { '0%': { opacity: '0', transform: 'translateY(10px)' }, '100%': { opacity: '1', transform: 'translateY(0)' } },
                        fadeIn: { '0%': { opacity: '0' }, '100%': { opacity: '1' } }
                    }
                }
            }
        }
    </script>

    <style>
        /* === BASE RESETS & SCROLLBAR === */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { height: 100%; width: 100%; overflow-x: hidden; margin: 0; padding: 0; }
        
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #00f0ff; }

        /* === UI FIXES FOR MOBILE OVERFLOW === */
        .chat-container { overflow-x: hidden; width: 100%; max-w: 100vw; }
        
        /* The Dhoti Fix: Absolute boundary for code blocks */
        .prose { max-width: 100%; word-break: break-word; overflow-wrap: break-word; }
        .prose pre {
            background: #1a1b26 !important; /* Tokyo Night Dark */
            border-radius: 0.75rem;
            margin: 1rem 0;
            padding: 3rem 1rem 1rem 1rem !important; /* Extra padding top for button */
            border: 1px solid rgba(255,255,255,0.1);
            position: relative;
            max-width: 100%; /* Prevents stretching */
            overflow-x: auto; /* Allows horizontal scrolling inside the box ONLY */
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .prose pre code {
            font-family: 'Fira Code', monospace;
            font-size: 0.85rem;
            white-space: pre; /* Keeps code formatting */
            display: block;
            min-width: 100%;
        }

        /* === THE COPY BUTTON (Absolute inside Pre) === */
        .copy-btn-wrapper {
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 2.5rem;
            background: rgba(0, 0, 0, 0.4);
            border-top-left-radius: 0.75rem;
            border-top-right-radius: 0.75rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 1rem;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            user-select: none;
        }
        .lang-badge { font-size: 0.7rem; color: #888; text-transform: uppercase; font-weight: bold; letter-spacing: 1px; }
        .copy-btn {
            background: rgba(0, 240, 255, 0.1);
            color: #00f0ff;
            border: 1px solid rgba(0, 240, 255, 0.3);
            padding: 0.2rem 0.6rem;
            border-radius: 0.3rem;
            font-size: 0.7rem;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }
        .copy-btn:hover { background: rgba(0, 240, 255, 0.3); }
        .copy-btn.copied { background: #22c55e; color: white; border-color: #22c55e; }

        /* === AESTHETICS === */
        .glass { background: rgba(18, 18, 18, 0.7); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.05); }
        .neon-border { position: relative; }
        .neon-border::after { content: ''; position: absolute; inset: -1px; border-radius: inherit; padding: 1px; background: linear-gradient(45deg, #00f0ff, #8a2be2); -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0); -webkit-mask-composite: xor; mask-composite: exclude; z-index: -1; }
        
        .typing-dot { display: inline-block; width: 6px; height: 6px; background: #00f0ff; border-radius: 50%; animation: typing 1.4s infinite ease-in-out both; }
        .typing-dot:nth-child(1) { animation-delay: -0.32s; }
        .typing-dot:nth-child(2) { animation-delay: -0.16s; }
        @keyframes typing { 0%, 80%, 100% { transform: scale(0); opacity: 0.3; } 40% { transform: scale(1); opacity: 1; boxShadow: 0 0 10px #00f0ff; } }

        /* Hides bottom input overlap */
        .chat-scroll-area { padding-bottom: 140px !important; }
    </style>
</head>

<body class="bg-cyber-black text-gray-200 font-sans antialiased overflow-hidden">

    <script>
        const DOM = {
            sidebar: document.getElementById('sidebar'),
            overlay: document.getElementById('overlay'),
            chatBox: document.getElementById('chatBox'),
            chatList: document.getElementById('chatList'),
            userInput: document.getElementById('userInput'),
            sendBtn: document.getElementById('sendBtn'),
            modelDisplay: document.getElementById('modelDisplay'),
            welcomeScreen: document.getElementById('welcomeScreen'),
            settingsModal: document.getElementById('settingsModal'),
            settingsBox: document.getElementById('settingsBox')
        };

        let state = {
            chats: JSON.parse(localStorage.getItem('nx_chats') || '[]'),
            activeId: null,
            isGenerating: false,
            config: {
                api: localStorage.getItem('nx_api') || '',
                model: localStorage.getItem('nx_model') || 'anthropic/claude-3.5-sonnet',
                prompt: localStorage.getItem('nx_prompt') || 'You are Nexus v4, an elite coder. Output clean code. No moral lectures.'
            }
        };

        // --- CUSTOM MARKDOWN RENDERER (The Magic Fix for Dhoti Phatna & Copy Button) ---
        const renderer = new marked.Renderer();
        renderer.code = function(code, language) {
            const validLang = highlight.getLanguage(language) ? language : 'plaintext';
            const highlighted = highlight.highlight(code, { language: validLang }).value;
            // Escape code for the copy button data attribute
            const escapedCode = code.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
            
            return `
                <div class="prose max-w-full">
                    <pre><div class="copy-btn-wrapper">
                            <span class="lang-badge">${validLang}</span>
                            <button class="copy-btn" onclick="copyCode(this)" data-code="${escapedCode}">
                                <i class="fa-regular fa-copy"></i> Copy
                            </button>
                        </div><code class="hljs ${validLang}">${highlighted}</code></pre>
                </div>
            `;
        };
        marked.setOptions({ renderer: renderer });

        // Global Copy Function
        window.copyCode = function(button) {
            const codeToCopy = button.getAttribute('data-code');
            const textarea = document.createElement('textarea');
            textarea.value = codeToCopy;
            document.body.appendChild(textarea);
            textarea.select();
            
            try {
                document.execCommand('copy');
                button.innerHTML = `<i class="fa-solid fa-check"></i> Copied!`;
                button.classList.add('copied');
                showToast('Payload Copied to Clipboard', 'success');
                setTimeout(() => {
                    button.innerHTML = `<i class="fa-regular fa-copy"></i> Copy`;
                    button.classList.remove('copied');
                }, 2000);
            } catch (err) {
                showToast('Failed to copy', 'error');
            }
            document.body.removeChild(textarea);
        };

        function showToast(msg, type='info') {
            const container = document.getElementById('toast-container');
            const t = document.createElement('div');
            const colors = { success: 'border-green-500 text-green-400', error: 'border-cyber-red text-cyber-red', info: 'border-cyber-blue text-cyber-blue' };
            t.className = `glass border-l-4 ${colors[type]} px-4 py-2 rounded text-sm font-mono flex items-center gap-2 transform -translate-y-10 opacity-0 transition-all duration-300`;
            t.innerHTML = `<i class="fa-solid ${type==='success'?'fa-check-circle':(type==='error'?'fa-triangle-exclamation':'fa-info-circle')}"></i> ${msg}`;
            container.appendChild(t);
            setTimeout(() => t.classList.remove('-translate-y-10', 'opacity-0'), 10);
            setTimeout(() => { t.classList.add('-translate-y-10', 'opacity-0'); setTimeout(()=>t.remove(), 300); }, 3000);
        }

        // --- UI Interactions ---
        function updateModelText() {
            let m = state.config.model.split('/').pop();
            DOM.modelDisplay.innerText = m.length > 15 ? m.substring(0, 15) + '...' : m;
        }

        function toggleMenu() {
            const isClosed = DOM.sidebar.classList.contains('-translate-x-full');
            if (isClosed) {
                DOM.sidebar.classList.remove('-translate-x-full');
                DOM.overlay.classList.remove('hidden');
                setTimeout(() => DOM.overlay.classList.add('opacity-100'), 10);
            } else {
                DOM.sidebar.classList.add('-translate-x-full');
                DOM.overlay.classList.remove('opacity-100');
                setTimeout(() => DOM.overlay.cla
