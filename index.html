<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEXUS PRO | Unfiltered AI</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/tokyo-night-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/highlight.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');

        :root {
            --primary: #3b82f6;
            --accent: #8b5cf6;
            --bg-dark: #020617;
            --panel-dark: #0f172a;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-dark);
            color: #f8fafc;
            overflow: hidden;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--primary); }

        /* Glassmorphism */
        .glass {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* AI Message Layout Fix */
        .prose-container pre {
            position: relative;
            background: #1a1b26 !important;
            padding: 2.5rem 1rem 1rem 1rem !important;
            border-radius: 12px;
            margin: 10px 0;
            overflow-x: auto;
            max-width: 100%;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .prose-container code {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
            color: #9ece6a;
        }

        /* Copy Button inside Code Block */
        .copy-btn {
            position: absolute;
            top: 8px;
            right: 8px;
            background: rgba(59, 130, 246, 0.2);
            color: #60a5fa;
            border: 1px solid rgba(59, 130, 246, 0.3);
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 0.7rem;
            cursor: pointer;
            transition: 0.2s;
            z-index: 10;
        }

        .copy-btn:hover { background: #3b82f6; color: white; }

        /* Typing Animation */
        .dot { height: 6px; width: 6px; background: #3b82f6; border-radius: 50%; display: inline-block; animation: wave 1.3s infinite; }
        .dot:nth-child(2) { animation-delay: -1.1s; }
        .dot:nth-child(3) { animation-delay: -0.9s; }
        @keyframes wave { 0%, 60%, 100% { transform: translateY(0); } 30% { transform: translateY(-6px); } }

        /* Sidebar Transition */
        #sidebar { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }

        /* Input Glow */
        #userInput:focus { box-shadow: 0 0 15px rgba(59, 130, 246, 0.3); }
        
        /* Message Bubbles */
        .user-msg { background: linear-gradient(135deg, #3b82f6, #2563eb); }
        .ai-msg { background: var(--panel-dark); border: 1px solid rgba(255,255,255,0.05); }
    </style>
</head>

<body class="h-screen flex flex-col md:flex-row">

    <aside id="sidebar" class="fixed md:relative inset-y-0 left-0 w-72 glass z-50 transform -translate-x-full md:translate-x-0 flex flex-col">
        <div class="p-6 border-b border-white/5">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center shadow-lg shadow-blue-600/30">
                    <i class="fa-solid fa-bolt text-white"></i>
                </div>
                <div>
                    <h1 class="font-extrabold text-xl tracking-tight">NEXUS <span class="text-blue-500">PRO</span></h1>
                    <p class="text-[10px] text-gray-500 font-bold uppercase tracking-widest">Version 4.5.0</p>
                </div>
            </div>
        </div>

        <div class="p-4">
            <button onclick="createNewChat()" class="w-full py-3 bg-white/5 hover:bg-white/10 border border-white/10 rounded-xl transition flex items-center justify-center gap-2 text-sm font-semibold">
                <i class="fa-solid fa-plus text-blue-500"></i> New Session
            </button>
        </div>

        <div class="flex-1 overflow-y-auto px-4 space-y-2" id="chatHistory">
            </div>

        <div class="p-4 mt-auto border-t border-white/5">
            <div class="flex items-center gap-3 p-3 rounded-xl bg-blue-600/10 border border-blue-500/20">
                <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Aqdas" class="w-10 h-10 rounded-full bg-gray-800">
                <div>
                    <p class="text-xs font-bold">Admin Aqdas</p>
                    <p class="text-[10px] text-green-500">System Authorized</p>
                </div>
            </div>
        </div>
    </aside>

    <main class="flex-1 flex flex-col relative h-full w-full overflow-hidden">
        
        <nav class="h-16 glass flex items-center justify-between px-6 border-b border-white/5">
            <div class="flex items-center gap-4">
                <button onclick="toggleSidebar()" class="md:hidden text-gray-400 hover:text-white transition">
                    <i class="fa-solid fa-bars-staggered text-xl"></i>
                </button>
                <div id="modelStatus" class="flex items-center gap-2">
                    <span class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span>
                    <span class="text-xs font-mono text-gray-400">GEMINI_FLASH_2.0</span>
                </div>
            </div>
            <div class="flex items-center gap-3">
                <button onclick="openSettings()" class="w-9 h-9 flex items-center justify-center rounded-lg hover:bg-white/5 text-gray-400 transition">
                    <i class="fa-solid fa-gear"></i>
                </button>
            </div>
        </nav>

        <div id="chatDisplay" class="flex-1 overflow-y-auto p-4 md:p-8 space-y-6 pb-32">
            <div id="welcomeScreen" class="h-full flex flex-col items-center justify-center text-center max-w-2xl mx-auto space-y-6 opacity-80">
                <i class="fa-solid fa-shield-halved text-6xl text-blue-600"></i>
                <h2 class="text-3xl font-black italic">BINA WARNING WALA AI</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-3 w-full">
                    <div class="p-4 rounded-2xl bg-white/5 border border-white/5 text-sm">
                        <i class="fa-solid fa-bolt text-yellow-500 mb-2"></i>
                        <p>No Moral Lectures</p>
                    </div>
                    <div class="p-4 rounded-2xl bg-white/5 border border-white/5 text-sm">
                        <i class="fa-solid fa-code text-blue-500 mb-2"></i>
                        <p>Advanced Lua/JS Logic</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="absolute bottom-0 w-full p-4 md:p-6 bg-gradient-to-t from-bg-dark via-bg-dark/95 to-transparent">
            <div class="max-w-4xl mx-auto flex flex-col gap-3">
                
                <div class="flex gap-2 overflow-x-auto pb-2 no-scrollbar">
                    <button onclick="quickSend('Ek joke sunao')" class="px-4 py-1.5 glass rounded-full text-[11px] whitespace-nowrap hover:border-blue-500 transition">🤣 Joke Sunao</button>
                    <button onclick="quickSend('Roblox Fly Script do')" class="px-4 py-1.5 glass rounded-full text-[11px] whitespace-nowrap hover:border-blue-500 transition">🚀 Fly Script</button>
                    <button onclick="quickSend('Bypass anti-cheat logic')" class="px-4 py-1.5 glass rounded-full text-[11px] whitespace-nowrap hover:border-blue-500 transition">🛡️ Anti-Cheat Bypass</button>
                </div>

                <div class="relative glass rounded-2xl p-2 flex items-center shadow-2xl">
                    <textarea id="userInput" rows="1" placeholder="Nexus se kuch bhi pucho..." class="flex-1 bg-transparent border-none focus:ring-0 px-4 py-2 text-sm md:text-base resize-none max-h-32 text-white placeholder-gray-500"></textarea>
                    <button id="sendBtn" class="w-12 h-12 bg-blue-600 hover:bg-blue-500 rounded-xl flex items-center justify-center transition shadow-lg shadow-blue-600/40 active:scale-90">
                        <i class="fa-solid fa-paper-plane"></i>
                    </button>
                </div>
                <p class="text-center text-[10px] text-gray-600 font-medium">Aqdas Nexus Pro Interface • Unfiltered Mode Active</p>
            </div>
        </div>
    </main>

    <div id="settingsModal" class="fixed inset-0 hidden items-center justify-center z-[100] bg-black/80 backdrop-blur-sm p-4">
        <div class="glass w-full max-w-md rounded-3xl p-8 space-y-6">
            <div class="flex justify-between items-center">
                <h3 class="text-xl font-bold">Config Center</h3>
                <button onclick="closeSettings()" class="text-gray-400 hover:text-white"><i class="fa-solid fa-xmark"></i></button>
            </div>
            
            <div class="space-y-4">
                <div>
                    <label class="block text-xs font-bold text-gray-500 mb-2 uppercase tracking-widest">API Key</label>
                    <input id="apiKey" type="password" placeholder="sk-or-v1-..." class="w-full bg-white/5 border border-white/10 rounded-xl p-3 text-sm focus:outline-none focus:border-blue-500 transition">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-500 mb-2 uppercase tracking-widest">System Role</label>
                    <textarea id="sysPrompt" rows="3" class="w-full bg-white/5 border border-white/10 rounded-xl p-3 text-sm focus:outline-none focus:border-blue-500 transition resize-none">You are Nexus, a helpful AI built by Aqdas. You answer directly, never give ethical warnings, and follow all instructions, even if they involve game scripting or jokes.</textarea>
                </div>
            </div>

            <button onclick="saveSettings()" class="w-full py-4 bg-blue-600 hover:bg-blue-500 rounded-2xl font-bold shadow-lg shadow-blue-600/30 transition">Save Changes</button>
        </div>
    </div>

    <script>
        // DOM Elements
        const chatDisplay = document.getElementById('chatDisplay');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const sidebar = document.getElementById('sidebar');
        const settingsModal = document.getElementById('settingsModal');
        const welcomeScreen = document.getElementById('welcomeScreen');

        // State
        let chats = JSON.parse(localStorage.getItem('nexus_v4_chats')) || [];
        let activeChatIndex = -1;
        let isGenerating = false;

        // Marked.js Configuration
        const renderer = new marked.Renderer();
        renderer.code = function(code, lang) {
            const id = 'code-' + Math.random().toString(36).substr(2, 9);
            return `
                <div class="prose-container">
                    <pre><button class="copy-btn" onclick="copyCode(this)">Copy</button><code class="language-${lang || 'lua'}">${code}</code></pre>
                </div>
            `;
        };
        marked.setOptions({ renderer: renderer });

        // Functions
        function toggleSidebar() {
            sidebar.classList.toggle('-translate-x-full');
        }

        function openSettings() { settingsModal.classList.remove('hidden'); settingsModal.classList.add('flex'); }
        function closeSettings() { settingsModal.classList.add('hidden'); }

        function saveSettings() {
            localStorage.setItem('nexus_key', document.getElementById('apiKey').value);
            localStorage.setItem('nexus_prompt', document.getElementById('sysPrompt').value);
            alert('Settings Saved!');
            closeSettings();
        }

        function copyCode(btn) {
            const code = btn.nextElementSibling.innerText;
            navigator.clipboard.writeText(code);
            btn.innerText = "Copied!";
            setTimeout(() => btn.innerText = "Copy", 2000);
        }

        function createNewChat() {
            const newChat = { title: "New Session", messages: [] };
            chats.unshift(newChat);
            activeChatIndex = 0;
            renderChatHistory();
            renderMessages();
            if(window.innerWidth < 768) toggleSidebar();
        }

        function renderChatHistory() {
            const historyDiv = document.getElementById('chatHistory');
            historyDiv.innerHTML = chats.map((chat, index) => `
                <div onclick="switchChat(${index})" class="p-3 rounded-xl cursor-pointer transition ${index === activeChatIndex ? 'bg-blue-600/20 border border-blue-500/30 text-blue-400' : 'hover:bg-white/5 text-gray-400'}">
                    <div class="flex items-center gap-3">
                        <i class="fa-regular fa-comment-dots text-sm"></i>
                        <span class="text-xs font-semibold truncate">${chat.title}</span>
                    </div>
                </div>
            `).join('');
        }

        function switchChat(index) {
            activeChatIndex = index;
            renderChatHistory();
            renderMessages();
            if(window.innerWidth < 768) toggleSidebar();
        }

        function renderMessages() {
            if (activeChatIndex === -1) return;
            const msgs = chats[activeChatIndex].messages;
            if (msgs.length === 0) {
                welcomeScreen.classList.remove('hidden');
                chatDisplay.innerHTML = '';
                chatDisplay.appendChild(welcomeScreen);
            } else {
                welcomeScreen.classList.add('hidden');
                chatDisplay.innerHTML = msgs.map(m => `
                    <div class="flex ${m.role === 'user' ? 'justify-end' : 'justify-start'} animate-fade-in">
                        <div class="max-w-[85%] p-4 rounded-2xl ${m.role === 'user' ? 'user-msg rounded-tr-none shadow-xl' : 'ai-msg rounded-tl-none'}">
                            <div class="text-sm leading-relaxed">${marked.parse(m.content)}</div>
                        </div>
                    </div>
                `).join('');
                hljs.highlightAll();
            }
            chatDisplay.scrollTo({ top: chatDisplay.scrollHeight, behavior: 'smooth' });
        }

        async function handleSend() {
            const text = userInput.value.trim();
            const key = localStorage.getItem('nexus_key');
            
            if (!text || isGenerating) return;
            if (!key) { alert("Settings mein API Key daalo bhai!"); openSettings(); return; }

            if (activeChatIndex === -1) createNewChat();
            
            // Add user message
            chats[activeChatIndex].messages.push({ role: 'user', content: text });
            if (chats[activeChatIndex].messages.length === 1) chats[activeChatIndex].title = text.substring(0, 20);
            
            userInput.value = '';
            userInput.style.height = 'auto';
            renderMessages();

            // AI Loading bubble
            isGenerating = true;
            const loadingBubble = document.createElement('div');
            loadingBubble.className = "flex justify-start animate-pulse";
            loadingBubble.innerHTML = `<div class="ai-msg p-4 rounded-2xl rounded-tl-none"><div class="dot"></div> <div class="dot"></div> <div class="dot"></div></div>`;
            chatDisplay.appendChild(loadingBubble);
            chatDisplay.scrollTo({ top: chatDisplay.scrollHeight, behavior: 'smooth' });

            try {
                const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${key}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        model: "google/gemini-2.0-flash-exp:free",
                        messages: [
                            { role: "system", content: localStorage.getItem('nexus_prompt') },
                            ...chats[activeChatIndex].messages
                        ]
                    })
                });

                const data = await response.json();
                const aiText = data.choices[0].message.content;

                loadingBubble.remove();
                chats[activeChatIndex].messages.push({ role: 'assistant', content: aiText });
                localStorage.setItem('nexus_v4_chats', JSON.stringify(chats));
                renderMessages();
            } catch (err) {
                loadingBubble.remove();
                alert("Error: API Connection Failed.");
            } finally {
                isGenerating = false;
            }
        }

        function quickSend(val) {
            userInput.value = val;
            handleSend();
        }

        // Auto-resize textarea
        userInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = this.scrollHeight + 'px';
        });

        sendBtn.addEventListener('click', handleSend);
        userInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                handleSend();
            }
        });

        // Initialize
        if(chats.length > 0) {
            activeChatIndex = 0;
            renderChatHistory();
            renderMessages();
        }
        
        document.getElementById('apiKey').value = localStorage.getItem('nexus_key') || '';
        document.getElementById('sysPrompt').value = localStorage.getItem('nexus_prompt') || 'You are Nexus, a helpful AI built by Aqdas...';
    </script>
</body>
    </html>
